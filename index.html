<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="node_modules/bootstrap/dist/css/bootstrap.css" rel="stylesheet">
    <link href="node_modules/font-awesome/css/font-awesome.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="node_modules/vue/dist/vue.global.js"></script>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <div id="side-nav" class="col-md-2" >
                <!-- Side Nav-->
                <img class="img-fluid" src="img/logo.png" alt="Responsive Image">
                <h1>RO-ED LOGISTICS SERVICES</h1>
                <ul class="nav-link">
                    <li class="nav-item"><a href="#">Link 1</a></li>
                    <li class="nav-item"><a href="#">Link 2</a></li>
                    <li class="nav-item"><a href="#">Link 3</a></li>
                    <li class="nav-item"><a href="#">Link 4</a></li>
                </ul>
            </div>
            <div class="col-10" style="padding: 0;">
                <!-- Top Navbar -->
                <nav id="top-nav" class="navbar navbar-expand-xl navbar-dark">
                    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <a class="nav-item mx-lg-3 nav-link p-3" href="#">Logout</a>
                </nav>
                <!-- Main Content -->
                <div id="content" class="container">
                    <H2>{{ pageTitle }}</H2>
                    <p>{{ content }}</p>
                </div>
    
            </div>
        </div>
    </div>

    <script>
        Vue.createApp({
            data() {
                return {
                    pageTitle: "Hello World!",
                    content: "This is some content so be content."
                };
            }
        }).mount('#content');
    </script>
</body>
</html>
